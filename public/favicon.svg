<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <style>
        @keyframes rainbow {
            0%   { fill: #ff6b8a; }
            20%  { fill: #ffb347; }
            40%  { fill: #6bcb77; }
            60%  { fill: #4d96ff; }
            80%  { fill: #c77dff; }
            100% { fill: #ff6b8a; }
        }
        circle {
            animation: rainbow 4s linear infinite;
        }
    </style>
    <circle cx="16" cy="16" r="14" />
</svg>
